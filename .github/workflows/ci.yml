---
name: CI
on:
  push:
  pull_request:
jobs:
  golangci:
    name: golang-ci
    env:
      GO111MODULE: on
    strategy:
      max-parallel: 3
      matrix:
        go-version: [ 1.26.x ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      - name: Cache go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/go/pkg/sumdb
            ~/.cache/go-build
          key: ${{ matrix.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ matrix.os }}-go-
      - name: Golang Format
        run: |
          make fmt
          STATUS=$(git status --porcelain go.mod go.sum)
          if [ ! -z "$STATUS" ]; then
            echo "Running 'make fmt' to format your codes"
            exit 1
          fi
      - name: Golang Lint
        run: make lint
      - name: Golang Vet
        run: make vet
      - name: Tidy Go Module
        run: |
          echo "verifying if there is any unused dependency in go module"
          make tidy
          STATUS=$(git status --porcelain go.mod go.sum)
          if [ ! -z "$STATUS" ]; then
            echo "Running 'make tidy' to fix your 'go.mod' and/or 'go.sum'"
            exit 1
          fi
          echo "go module is tidy."
